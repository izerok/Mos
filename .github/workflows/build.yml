name: Build

on:
  push:
    branches:
      - master
    paths:
      - "Mos/**"
      - "MosTests/**"
      - "Mos.xcodeproj/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test (Debug) + Build (Release)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project Mos.xcodeproj \
            -scheme Debug

      # Tests stay on Debug — @testable imports + non-optimized assertions are
      # more reliable, and the test plan is wired to the Debug configuration.
      - name: Run tests (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project Mos.xcodeproj \
            -scheme Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            test

      # Release build = the artifact we ship. PRODUCT_NAME=Mos (not Mos Debug),
      # full optimization, code signing disabled (ad-hoc) so the workflow runs
      # without secrets — users will need to allow the unsigned app once.
      - name: Build (Release, code signing disabled)
        run: |
          set -o pipefail
          xcodebuild \
            -project Mos.xcodeproj \
            -scheme Debug \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      # xcodebuild 默认只给 main binary linker-signed, 不会给 bundle 做
      # _CodeSignature/CodeResources. 没 sealed resources 时 TCC 在 Sequoia+
      # 会无法稳定记住授权 (跑日志会看到 "Failed to match existing code
      # requirement"). 这里手动深度优先 ad-hoc 重签, 把 Sparkle 嵌套的 XPC /
      # Updater.app / framework 一层层签透.
      - name: Ad-hoc deep sign Release bundle
        run: |
          set -o pipefail
          APP="build/DerivedData/Build/Products/Release/Mos.app"
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework"
          SPARKLE_VER=$(readlink "$SPARKLE/Versions/Current")
          SPARKLE_REAL="$SPARKLE/Versions/$SPARKLE_VER"
          # 深度优先: 最内层先签
          codesign --force --sign - "$SPARKLE_REAL/XPCServices/Downloader.xpc"
          codesign --force --sign - "$SPARKLE_REAL/XPCServices/Installer.xpc"
          codesign --force --sign - "$SPARKLE_REAL/Updater.app"
          codesign --force --sign - "$SPARKLE"
          codesign --force --sign - "$APP"
          echo "=== final signature ==="
          codesign -dvvv "$APP" 2>&1 | head -15

      - name: Locate built Release app
        run: |
          PRODUCTS_DIR="build/DerivedData/Build/Products/Release"
          echo "Contents of $PRODUCTS_DIR:"
          ls -la "$PRODUCTS_DIR"
          APP_PATH=$(find "$PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in Release"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH/Contents/MacOS/"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Contents/Info.plist" || true

      - name: Upload built .app
        uses: actions/upload-artifact@v4
        with:
          name: Mos-Release-app
          path: build/DerivedData/Build/Products/Release/*.app
          retention-days: 14
          if-no-files-found: error
